<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法考刑法财产犯罪审查逻辑系统</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }
        .step-active {
            border-color: #3b82f6;
            background-color: #eff6ff;
            color: #1d4ed8;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white shadow-md border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="scale" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">法考刑法：财产犯罪精细化定性审查系统</h1>
                    <p class="text-xs text-slate-400">摒弃主观直觉 · 聚焦客观处分 · 严密逻辑递进</p>
                </div>
            </div>
            <div class="flex gap-2">
                <span class="inline-flex items-center gap-1 bg-slate-800 px-3 py-1 rounded-full text-xs text-slate-300 border border-slate-700">
                    <i data-lucide="shield-alert" class="w-3.5 h-3.5 text-yellow-500"></i> 严禁直觉归因
                </span>
                <span class="inline-flex items-center gap-1 bg-slate-800 px-3 py-1 rounded-full text-xs text-slate-300 border border-slate-700">
                    <i data-lucide="check-circle-2" class="w-3.5 h-3.5 text-green-500"></i> 处分原因为核
                </span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left Side: Interactive Diagnostics & Sandbox (7 Cols) -->
        <section class="lg:col-span-7 space-y-8">
            
            <!-- Sandbox Banner -->
            <div class="bg-gradient-to-r from-blue-700 to-indigo-800 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                <div class="absolute -right-10 -bottom-10 opacity-10">
                    <i data-lucide="file-text" class="w-48 h-48"></i>
                </div>
                <div class="relative z-10">
                    <span class="bg-blue-500/30 text-blue-200 text-xs font-semibold px-2.5 py-1 rounded-full uppercase tracking-wider">核心裁判逻辑</span>
                    <h2 class="text-2xl font-bold mt-2 mb-3">罪名定性四步推导沙盒</h2>
                    <p class="text-slate-200 text-sm leading-relaxed mb-4">
                        不要首先纠结“非法占有目的”（那是民刑交叉的门槛门禁）。财产犯罪罪名之间的区分，首先看<strong>被害人有没有处分行为</strong>，以及<strong>处分行为形成的原因</strong>。
                    </p>
                    <button onclick="resetDecisionTree()" class="bg-white text-blue-900 hover:bg-slate-100 transition px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-sm">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重置诊断推导
                    </button>
                </div>
            </div>

            <!-- Decision Tree Simulator Card -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                    <h3 class="text-lg font-bold flex items-center gap-2 text-slate-900">
                        <i data-lucide="git-fork" class="text-blue-600"></i> 
                        动态定性推导沙盒
                    </h3>
                    <span class="text-xs text-slate-500">点击符合案情的特征逐步递进</span>
                </div>

                <!-- Step Tabs UI (Progress Indicator) -->
                <div class="grid grid-cols-4 gap-2 mb-6">
                    <div id="tab-step-1" class="border-b-2 border-blue-600 pb-2 text-center transition-all duration-300">
                        <p class="text-xs text-slate-400 font-medium">STEP 1</p>
                        <p class="text-xs sm:text-sm font-bold text-blue-600">处分行为</p>
                    </div>
                    <div id="tab-step-2" class="border-b-2 border-slate-200 pb-2 text-center transition-all duration-300">
                        <p class="text-xs text-slate-400 font-medium">STEP 2</p>
                        <p class="text-xs sm:text-sm font-bold text-slate-400">意思状态</p>
                    </div>
                    <div id="tab-step-3" class="border-b-2 border-slate-200 pb-2 text-center transition-all duration-300">
                        <p class="text-xs text-slate-400 font-medium">STEP 3</p>
                        <p class="text-xs sm:text-sm font-bold text-slate-400">外在干扰</p>
                    </div>
                    <div id="tab-step-result" class="border-b-2 border-slate-200 pb-2 text-center transition-all duration-300">
                        <p class="text-xs text-slate-400 font-medium">RESULT</p>
                        <p class="text-xs sm:text-sm font-bold text-slate-400">推导结论</p>
                    </div>
                </div>

                <!-- Current Step Panel Container -->
                <div id="diagnostic-panel" class="min-h-[220px] bg-slate-50 rounded-xl p-5 border border-slate-100 flex flex-col justify-between">
                    <!-- Dynamic Content Loaded via JS -->
                </div>
            </div>

            <!-- Core Test Scenarios (5 Categories) -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold flex items-center gap-2 text-slate-900 mb-6 pb-4 border-b border-slate-100">
                    <i data-lucide="layers" class="text-indigo-600"></i>
                    法考最爱考的五类核心考法分类
                </h3>

                <!-- Tabs for 5 Categories -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <button onclick="switchCategoryTab('category-1')" id="btn-category-1" class="category-btn px-4 py-2 rounded-lg text-sm font-medium bg-indigo-50 text-indigo-700 border border-indigo-200 transition-all">
                        1. 取得型犯罪
                    </button>
                    <button onclick="switchCategoryTab('category-2')" id="btn-category-2" class="category-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
                        2. 占有转化型
                    </button>
                    <button onclick="switchCategoryTab('category-3')" id="btn-category-3" class="category-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
                        3. 毁坏型犯罪
                    </button>
                    <button onclick="switchCategoryTab('category-4')" id="btn-category-4" class="category-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
                        4. 暴力升级型
                    </button>
                    <button onclick="switchCategoryTab('category-5')" id="btn-category-5" class="category-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
                        5. 新兴交叉财产
                    </button>
                </div>

                <!-- Category Content Blocks -->
                <div id="category-content-container" class="space-y-4">
                    <!-- Dynamic Injection based on selection -->
                </div>
            </div>

        </section>

        <!-- Right Side: Essential Tables & Comparison Cards (5 Cols) -->
        <section class="lg:col-span-5 space-y-8">
            
            <!-- Quick Formula Reference / Key Map -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold flex items-center gap-2 text-slate-900 mb-4">
                    <i data-lucide="grid" class="text-emerald-600"></i>
                    法考核心罪名判定金图表
                </h3>
                <p class="text-xs text-slate-500 mb-4">快速定位法考选择题中的实质行为区分点：</p>
                
                <div class="overflow-x-auto rounded-lg border border-slate-200">
                    <table class="w-full text-left text-sm border-collapse">
                        <thead class="bg-slate-50 border-b border-slate-200 text-slate-700 font-semibold">
                            <tr>
                                <th class="p-3">罪名</th>
                                <th class="p-3">处分行为?</th>
                                <th class="p-3">交付之原因</th>
                                <th class="p-3">行为本质</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <tr class="hover:bg-slate-50/50 transition">
                                <td class="p-3 font-semibold text-slate-900">盗窃罪</td>
                                <td class="p-3"><span class="bg-rose-100 text-rose-800 text-[11px] px-2 py-0.5 rounded-full font-medium">无</span></td>
                                <td class="p-3 text-slate-500">无交付意愿</td>
                                <td class="p-3 text-slate-600 font-mono text-xs">秘密窃取 / 平和移转占有</td>
                            </tr>
                            <tr class="hover:bg-slate-50/50 transition">
                                <td class="p-3 font-semibold text-slate-900">诈骗罪</td>
                                <td class="p-3"><span class="bg-green-100 text-green-800 text-[11px] px-2 py-0.5 rounded-full font-medium">有</span></td>
                                <td class="p-3 text-blue-600 font-medium">陷入错误认识</td>
                                <td class="p-3 text-slate-600 font-mono text-xs">基于错误处分并交付</td>
                            </tr>
                            <tr class="hover:bg-slate-50/50 transition">
                                <td class="p-3 font-semibold text-slate-900">敲诈勒索</td>
                                <td class="p-3"><span class="bg-green-100 text-green-800 text-[11px] px-2 py-0.5 rounded-full font-medium">有</span></td>
                                <td class="p-3 text-orange-600 font-medium">产生恐惧心理</td>
                                <td class="p-3 text-slate-600 font-mono text-xs">被迫选择处分以求避祸</td>
                            </tr>
                            <tr class="hover:bg-slate-50/50 transition">
                                <td class="p-3 font-semibold text-slate-900">抢劫罪</td>
                                <td class="p-3"><span class="bg-rose-100 text-rose-800 text-[11px] px-2 py-0.5 rounded-full font-medium">无 (法律意义)</span></td>
                                <td class="p-3 text-red-600 font-medium">绝对暴力压制</td>
                                <td class="p-3 text-slate-600 font-mono text-xs">丧失意志自主下被迫交出</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-lg">
                    <p class="text-xs text-blue-800 font-medium leading-relaxed">
                        <strong>📌 非法占有目的的角色定义：</strong><br>
                        它是判断<strong>“构不构成犯罪”</strong>的标尺（如：借钱不还是民事纠纷还是合同诈骗）；而不是判断<strong>“构成此罪还是彼罪”</strong>（盗窃 vs 诈骗）的划分标准。
                    </p>
                </div>
            </div>

            <!-- Key Contrast Pairs (Toggle List Accordions) -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold flex items-center gap-2 text-slate-900 mb-4">
                    <i data-lucide="git-compare" class="text-orange-600"></i>
                    5组命题人最爱设伏的易混淆点
                </h3>
                
                <div class="space-y-3">
                    
                    <!-- Pair 1 -->
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <button onclick="toggleAccordion('acc-1')" class="w-full flex justify-between items-center p-4 bg-slate-50 hover:bg-slate-100 transition text-left">
                            <span class="font-bold text-sm text-slate-800">1. 盗窃罪 VS 诈骗罪 (核心焦点)</span>
                            <i id="icon-acc-1" data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform"></i>
                        </button>
                        <div id="acc-1" class="hidden p-4 border-t border-slate-200 bg-white text-xs space-y-2 leading-relaxed">
                            <p class="font-bold text-rose-600">核心区分点：被害人有无“处分行为”及“处分意思”。</p>
                            <p><strong>典型例子：</strong></p>
                            <ul class="list-disc pl-4 space-y-1 text-slate-600">
                                <li><strong>诈骗：</strong>甲假扮房东，租客基于错误认识主动转租金。有处分，是诈骗。</li>
                                <li><strong>盗窃：</strong>甲趁租客熟睡拿走钱包，租客完全不知情、无处分行为。是盗窃。</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Pair 2 -->
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <button onclick="toggleAccordion('acc-2')" class="w-full flex justify-between items-center p-4 bg-slate-50 hover:bg-slate-100 transition text-left">
                            <span class="font-bold text-sm text-slate-800">2. 诈骗罪 VS 敲诈勒索罪</span>
                            <i id="icon-acc-2" data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform"></i>
                        </button>
                        <div id="acc-2" class="hidden p-4 border-t border-slate-200 bg-white text-xs space-y-2 leading-relaxed">
                            <p class="font-bold text-rose-600">核心区分点：交付财物的基础动机是“傻了(欺骗)”还是“怕了(恐惧)”。</p>
                            <p><strong>典型例子：</strong></p>
                            <ul class="list-disc pl-4 space-y-1 text-slate-600">
                                <li><strong>诈骗：</strong>假冒大师说只要转账就能祈福消灾，信以为真而交付。</li>
                                <li><strong>敲诈勒索：</strong>声称不给钱就曝光隐私视频，因产生巨大恐惧、两害相权取其轻而转账。</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Pair 3 -->
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <button onclick="toggleAccordion('acc-3')" class="w-full flex justify-between items-center p-4 bg-slate-50 hover:bg-slate-100 transition text-left">
                            <span class="font-bold text-sm text-slate-800">3. 抢劫罪 VS 敲诈勒索罪</span>
                            <i id="icon-acc-3" data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform"></i>
                        </button>
                        <div id="acc-3" class="hidden p-4 border-t border-slate-200 bg-white text-xs space-y-2 leading-relaxed">
                            <p class="font-bold text-rose-600">核心区分点：被害人的意思自主空间是否已被“彻底压制”（即当场丧失抗拒能力）。</p>
                            <p><strong>典型例子：</strong></p>
                            <ul class="list-disc pl-4 space-y-1 text-slate-600">
                                <li><strong>敲诈：</strong>“三天内不给我转账就打断你的腿”（尚存考虑与选择的时间）。</li>
                                <li><strong>抢劫：</strong>尖刀抵喉，“立刻把身上首饰和微信密码给我”（毫无选择，只能服从当场交付，法律上视同无处分行为）。</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Pair 4 -->
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <button onclick="toggleAccordion('acc-4')" class="w-full flex justify-between items-center p-4 bg-slate-50 hover:bg-slate-100 transition text-left">
                            <span class="font-bold text-sm text-slate-800">4. 盗窃罪 VS 侵占罪</span>
                            <i id="icon-acc-4" data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform"></i>
                        </button>
                        <div id="acc-4" class="hidden p-4 border-t border-slate-200 bg-white text-xs space-y-2 leading-relaxed">
                            <p class="font-bold text-rose-600">核心区分点：财物到手之前，行为人是否已经建立起了“合法占有”。</p>
                            <p><strong>典型例子：</strong></p>
                            <ul class="list-disc pl-4 space-y-1 text-slate-600">
                                <li><strong>侵占：</strong>替朋友代为保管高档数码相机（此时已处于合法占有），后拒不返还。</li>
                                <li><strong>盗窃：</strong>假借试用手机，趁人不备拔腿就跑。借口“保管”并非法律意义的占有转移，拿到手上之前仍属失主控制，故构成盗窃。</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Pair 5 -->
                    <div class="border border-slate-200 rounded-xl overflow-hidden">
                        <button onclick="toggleAccordion('acc-5')" class="w-full flex justify-between items-center p-4 bg-slate-50 hover:bg-slate-100 transition text-left">
                            <span class="font-bold text-sm text-slate-800">5. 盗窃罪 VS 转化型抢劫罪</span>
                            <i id="icon-acc-5" data-lucide="chevron-down" class="w-4 h-4 text-slate-500 transition-transform"></i>
                        </button>
                        <div id="acc-5" class="hidden p-4 border-t border-slate-200 bg-white text-xs space-y-2 leading-relaxed">
                            <p class="font-bold text-rose-600">核心区分点：秘密窃取财物后，为了“窝藏赃物、抗拒抓捕或毁灭证据”而当场使用暴力或暴力威胁。</p>
                            <p><strong>法律规范：</strong>刑法第二百六十九条之规定。</p>
                            <p><strong>典型例子：</strong></p>
                            <ul class="list-disc pl-4 space-y-1 text-slate-600">
                                <li>小偷潜入民宅行窃，被主人发现围堵。为了摆脱抓捕，掏出匕首刺伤主人后逃逸。—— 构成转化型抢劫罪，不以盗窃一罪定论。</li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Instant Challenge / Simulated Question Card -->
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold flex items-center gap-2 text-slate-900">
                        <i data-lucide="graduation-cap" class="text-purple-600"></i>
                        法考经典考案即时练
                    </h3>
                    <span class="bg-purple-100 text-purple-800 text-[11px] px-2.5 py-0.5 rounded-full font-semibold">难点解析</span>
                </div>
                
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-100 mb-4">
                    <p class="text-sm font-medium leading-relaxed text-slate-800" id="quiz-question-text">
                        <!-- Simulated Case Scenario injected here -->
                    </p>
                </div>

                <!-- Multiple Choice Elements -->
                <div class="space-y-2" id="quiz-options-container">
                    <!-- Dynamic Choices -->
                </div>

                <div id="quiz-feedback" class="hidden mt-4 p-4 rounded-xl text-xs leading-relaxed">
                    <!-- Feedback details here -->
                </div>
            </div>

        </section>

    </main>

    <!-- Footer Banner -->
    <footer class="bg-slate-900 border-t border-slate-800 text-slate-400 py-6 text-center text-xs mt-12">
        <p class="mb-1">© 2026 法理学人·法理考定性辅助系统. 版权所有.</p>
        <p>法考财产罪命题法理依据：《中华人民共和国刑法》及最高人民法院相关司法解释</p>
    </footer>

    <!-- JS Logic -->
    <script>
        // State variables
        let treeState = {
            step: 1,
            disposition: null,    // 'yes' | 'no'
            freewill: null,       // 'free' | 'fear' | 'suppressed'
            originalPossession: null, // 'lawful' | 'unlawful'
            violenceType: null,   // 'robbery' | 'transform' | 'none'
            destructionOnly: null // 'yes' | 'no'
        };

        // Decision steps structure
        const decisionSteps = {
            1: {
                title: "第一步：被害人是否有“处分行为”？",
                description: "处分行为是指被害人基于自己的意思（即使是被骗/被吓），主动把财物脱离自己的占有控制，交到行为人手里。",
                options: [
                    {
                        text: "有处分行为（主动转账、给付、交付财物）",
                        value: "yes",
                        desc: "例如：租客把钱转给假房东；被害人由于恐惧主动转账。"
                    },
                    {
                        text: "无处分行为（不知情下转移、被动丧失）",
                        value: "no",
                        desc: "例如：睡觉时手机被摸走；光天化日直接夺取；绝对暴力压制下无自主能力地被抢。"
                    }
                ]
            },
            2: {
                title: "第二步：被害人的处分行为，其意思是否属于自由状态？",
                description: "判断在交付这一瞬间，促使被害人行为的主观推力到底是什么。",
                options: [
                    {
                        text: "存在意思自主（由于信息不对称被骗）",
                        value: "free",
                        desc: "被害人可以自由选择交付或拒绝，只是因为“信息虚假”信错、认错、上当了。→ 指向诈骗。"
                    },
                    {
                        text: "因“恐惧心理”非自愿交付",
                        value: "fear",
