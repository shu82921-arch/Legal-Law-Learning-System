        function handleTreeSelection(value) {
            const step = treeState.step;
            if (step === 1) {
                treeState.disposition = value;
                treeState.step = 2; // will auto-skip to 3 inside render if value is 'no'
            } else if (step === 2) {
                treeState.freewill = value;
                treeState.step = 4; // Result phase for disposition = 'yes'
            } else if (step === 3) {
                // If it came from disposition = 'no' path
                if (value === 'no-violence') {
                    // Let's ask if it was already in their lawful possession beforehand (Invade vs Theft)
                    treeState.step = 3.5; // Custom intermediate check for Theft vs Embezzlement
                    renderTheftVsEmbezzlementCheck();
                    return;
                } else if (value === 'violence') {
                    treeState.violenceType = 'robbery';
                } else if (value === 'transform-violence') {
                    treeState.violenceType = 'transform';
                }
                treeState.step = 4;
            }
            renderDecisionTree();
        }

