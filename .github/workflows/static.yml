                        <p class="text-xs text-slate-500 mt-1">存款、数据币、网络武器装备均包含价值，受刑法财产罪规制。</p>
                    </div>
                    <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 space-y-3 text-xs">
                        <div class="space-y-2 text-slate-700">
                            <p><strong>财产范围延伸：</strong>电力、具有实质现实交换价值的网络装备、游戏币、加密账户及存款均构成刑法保护的财产。</p>
                            <p><strong>实操认定准则：</strong></p>
                            <ul class="list-disc pl-4 space-y-1 text-slate-600">
                                <li>窃取他人手机当场盗转支付宝余额 $\rightarrow$ 属于<strong>盗窃罪</strong>。</li>
                                <li>破解他人游戏装备并挂载交易变现 $\rightarrow$ 依据非法取得路径，主推<strong>盗窃罪</strong>或<strong>计算机犯罪</strong>竞合。</li>
                            </ul>
                        </div>
                    </div>
                </div>
            `
        };

        function switchCategoryTab(catId) {
            // Update Tab active UI
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = "category-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all";
            });
            const activeBtn = document.getElementById(`btn-${catId}`);
            activeBtn.className = "category-btn px-4 py-2 rounded-lg text-sm font-medium bg-indigo-50 text-indigo-700 border border-indigo-200 transition-all";

            // Inject Content
            document.getElementById('category-content-container').innerHTML = categoriesData[catId];
            lucide.createIcons();
        }

        // Accordion for contrast pairs
        function toggleAccordion(accId) {
            const el = document.getElementById(accId);
            const icon = document.getElementById(`icon-${accId}`);
            
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                el.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // Mini Quiz Sandbox (Data)
        const quizzes = [
            {
                question: "甲在公共汽车上见一妇女怀抱婴儿，颈上挂有一条纯金项链。甲假借帮其抱孩子之名，当妇女将孩子递给甲的瞬间，猛然抓取该纯金项链并飞奔下车逃走。甲的行为如何定性？",
                options: [
                    { text: "A. 抢劫罪 (暴力达到不可抗拒)", value: "A" },
                    { text: "B. 抢夺罪 (趁人不备，公然夺取)", value: "B" },
                    { text: "C. 盗窃罪 (秘密窃取，平和手段)", value: "C" },
                    { text: "D. 诈骗罪 (假借抱孩子骗取财物)", value: "D" }
                ],
                answer: "B",
                analysis: "<strong>正确答案是 B。</strong><br>1. 该妇女虽然将婴儿递交，但并没有将‘项链’的占有权进行处分的任何意识。因此<strong>不存在对项链的处分行为</strong>。排除诈骗罪。<br>2. 行为人趁人不备、公然夺取其紧身挂饰项链，并没有使用能彻底压制其意志的当场暴力，未达到抢劫程度。故构成<strong>抢夺罪</strong>。"
            },
            {
                question: "甲假冒某高档小区业主在二手平台上高价收购名牌手表，约定在小区大堂交易。甲拿到受害人递来的价值20万百达翡丽手表‘试戴’时，对受害人说：‘我去旁边亮一点的地方拍个照看成色。’随即从大堂侧门溜走。甲构成何罪？",
                options: [
                    { text: "A. 诈骗罪 (属于虚构事实骗取财物)", value: "A" },
                    { text: "B. 侵占罪 (属于合法代管后拒绝归还)", value: "B" },
                    { text: "C. 盗窃罪 (无实质处分行为下的平和移转)", value: "C" },
                    { text: "D. 抢夺罪 (公然拿走他人财物)", value: "D" }
                ],
                answer: "C",
                analysis: "<strong>正确答案是 C（盗窃罪）。</strong><br>这是法考极其经典的‘借口试用乘机溜走’考案：<br>1. <strong>无处分行为：</strong>虽然手表由被害人‘递’给了甲，但这只是出于在失主视线范围内的‘试戴、看成色’，失主从未有将手表的所有权或独立的占有控制权进行转移的意愿。<br>2. 由于被害人并无处分意思，甲把在被害人紧密控制下的手表借机脱离失主视线据为己有，本质上属于打破既有占有，构成<strong>盗窃罪</strong>而非诈骗罪。"
            }
        ];

        let currentQuizIndex = 0;

        function loadQuiz() {
            const quiz = quizzes[currentQuizIndex];
            document.getElementById('quiz-question-text').innerHTML = `${currentQuizIndex + 1}. ${quiz.question}`;
            
            let optionsHTML = '';
            quiz.options.forEach(opt => {
                optionsHTML += `
                    <button onclick="checkAnswer('${opt.value}')" class="quiz-opt-btn w-full text-left bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 text-xs p-3 rounded-lg transition font-medium">
                        ${opt.text}
                    </button>
                `;
            });
            document.getElementById('quiz-options-container').innerHTML = optionsHTML;
            
            const feedback = document.getElementById('quiz-feedback');
            feedback.className = "hidden mt-4 p-4 rounded-xl text-xs leading-relaxed";
            feedback.innerHTML = '';
        }

        function checkAnswer(val) {
            const quiz = quizzes[currentQuizIndex];
            const feedback = document.getElementById('quiz-feedback');
            
            // Disable buttons to avoid multiple clicking
            document.querySelectorAll('.quiz-opt-btn').forEach(btn => {
                btn.disabled = true;
            });

            if (val === quiz.answer) {
                feedback.className = "mt-4 p-4 rounded-xl text-xs leading-relaxed bg-green-50 border border-green-200 text-green-800";
                feedback.innerHTML = `
                    <div class="flex items-center gap-2 mb-2 font-bold text-sm">
                        <i data-lucide="check-circle" class="w-4 h-4 text-green-600"></i> 回答正确！
                    </div>
                    ${quiz.analysis}
                    ${getNextQuizButtonHTML()}
                `;
            } else {
                feedback.className = "mt-4 p-4 rounded-xl text-xs leading-relaxed bg-rose-50 border border-rose-200 text-rose-800";
                feedback.innerHTML = `
                    <div class="flex items-center gap-2 mb-2 font-bold text-sm">
                        <i data-lucide="alert-triangle" class="w-4 h-4 text-rose-600"></i> 回答错误，请看深度解析。
                    </div>
                    ${quiz.analysis}
                    ${getNextQuizButtonHTML()}
                `;
            }
            lucide.createIcons();
        }

        function getNextQuizButtonHTML() {
            if (currentQuizIndex < quizzes.length - 1) {
                return `
                    <button onclick="nextQuiz()" class="mt-3 bg-slate-800 hover:bg-slate-700 text-white text-[11px] font-semibold px-3 py-1.5 rounded transition">
                        下一题
                    </button>
                `;
            } else {
                return `
                    <button onclick="resetQuiz()" class="mt-3 bg-indigo-600 hover:bg-indigo-700 text-white text-[11px] font-semibold px-3 py-1.5 rounded transition">
                        重新开始自测
                    </button>
                `;
            }
        }

        function nextQuiz() {
            currentQuizIndex++;
            loadQuiz();
        }

        function resetQuiz() {
            currentQuizIndex = 0;
            loadQuiz();
        }
    </script>

</body>
</html>
