        // Render Decision Tree DOM dynamically
        function renderDecisionTree() {
            const container = document.getElementById('diagnostic-panel');
            const step = treeState.step;

            // Highlight progress tabs
            updateTabStates(step);

            if (step <= 3) {
                // If we need custom path divergence for Step 2 and 3:
                // If state.disposition is 'no', we bypass Step 2 (since no disposition exists, we skip to violence check)
                if (step === 2 && treeState.disposition === 'no') {
                    // Automatically jump step or present specific bypass
                    treeState.step = 3;
                    renderDecisionTree();
                    return;
                }

                let currentData = decisionSteps[step];
                
                // Special case override descriptions
                if (step === 3 && treeState.disposition === 'no') {
                    currentData = {
